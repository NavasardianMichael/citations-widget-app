# ==============================================================================
# Continuous Integration — typecheck, build, verify Docker image
# ==============================================================================
# Runs on pull requests to master that touch the server or deploy config.
# ==============================================================================

name: CI

on:
  pull_request:
    branches: [master]
    paths:
      - 'server/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  actions: write

jobs:
  ci:
    name: Server CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify server Docker image builds
        uses: docker/build-push-action@v7
        with:
          context: ./server
          file: server/Dockerfile
          push: false
          load: true
          tags: citations-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
