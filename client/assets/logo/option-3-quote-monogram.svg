<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Մեջբերումներ Աստվածաշնչից logo — quote formed from folded pages">
  <defs>
    <linearGradient id="o3-fold-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbf9f8"/>
      <stop offset="100%" stop-color="#b3c8eb"/>
    </linearGradient>
    <linearGradient id="o3-fold-b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4e3ff"/>
      <stop offset="100%" stop-color="#fbf9f8"/>
    </linearGradient>
  </defs>

  <ellipse cx="64" cy="112" rx="34" ry="5" fill="#021a35" opacity="0.12"/>

  <!-- Outer quote shape built from folded page planes (left comma) -->
  <g transform="translate(18 28)">
    <!-- Upper rounded page block -->
    <path
      d="M8 8 C8 3.6 11.6 0 16 0 H34 C38.4 0 42 3.6 42 8 V34 C42 42 36 48 28 48 H8 V8 Z"
      fill="url(#o3-fold-a)"
      stroke="#021a35"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <!-- Fold crease -->
    <path d="M8 20 H42" stroke="#021a35" stroke-width="1.5" opacity="0.18"/>
    <!-- Descending page tail (quote stem) -->
    <path
      d="M8 48 C8 62 14 74 28 84 L22 90 C6 78 -2 62 -2 46 Z"
      fill="#021a35"
    />
    <path
      d="M10 50 C10 62 15 72 26 80 L23 84 C12 76 6 64 6 50 Z"
      fill="#fed65b"
    />
  </g>

  <!-- Right quote, mirrored page folds -->
  <g transform="translate(68 28)">
    <path
      d="M8 8 C8 3.6 11.6 0 16 0 H34 C38.4 0 42 3.6 42 8 V34 C42 42 36 48 28 48 H8 V8 Z"
      fill="url(#o3-fold-b)"
      stroke="#021a35"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <path d="M8 20 H42" stroke="#021a35" stroke-width="1.5" opacity="0.18"/>
    <path
      d="M8 48 C8 62 14 74 28 84 L22 90 C6 78 -2 62 -2 46 Z"
      fill="#021a35"
    />
    <path
      d="M10 50 C10 62 15 72 26 80 L23 84 C12 76 6 64 6 50 Z"
      fill="#fed65b"
    />
  </g>

  <!-- Tiny citation lines inside each "page" block -->
  <g stroke="#021a35" stroke-width="1.5" stroke-linecap="round" opacity="0.28">
    <line x1="34" y1="42" x2="50" y2="42"/>
    <line x1="34" y1="48" x2="46" y2="48"/>
    <line x1="84" y1="42" x2="100" y2="42"/>
    <line x1="84" y1="48" x2="96" y2="48"/>
  </g>
</svg>
